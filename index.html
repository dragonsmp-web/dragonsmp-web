<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dragon SMP — Wiki</title>
  <meta name="description" content="Wiki officiel du serveur Minecraft Dragon SMP">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="header-logo" href="index.html">🐉 Dragon<span>SMP</span></a>

    <!-- Recherche -->
    <div class="header-search">
      <span class="search-icon">🔍</span>

      <div class="search-results" id="search-results"></div>
    </div>

    <!-- Actions -->
    <div class="header-actions">
      <a href="https://discord.gg/TON_LIEN" target="_blank" class="btn btn-primary btn-sm">

      </a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>

  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div id="sidebar-nav">
        <!-- Rempli dynamiquement par app.js -->
      </div>

      <!-- Lien admin en bas -->
      <div style="padding: 1rem 1.2rem; margin-top: auto;">
        <div class="sidebar-divider" style="margin: 0 0 1rem;"></div>
        <a href="admin.html" class="sidebar-item" style="opacity: 0.5; font-size: 0.82rem;">
          <span class="item-icon">⚙️</span> Admin
        </a>
      </div>
    </aside>

    <!-- CONTENU PRINCIPAL -->
    <main class="main">
      <div id="page-container">
        <!-- Rempli dynamiquement par app.js -->
        <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-dim)">
          Chargement...
        </div>
      </div>
    </main>

  </div>

  <!-- FOOTER -->
  <footer>
    <span>🐉</span> Dragon SMP Wiki — Fait avec passion par la communauté &nbsp;·&nbsp;
    <a href="admin.html">Admin</a>
  </footer>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="app.js"></script>

</html>
