<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon SMP</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   DRAGON SMP — WIKI V5
   Design épuré, professionnel, centré
════════════════════════════════════════════ */
:root {
  --fire:   #d94f1e;
  --ember:  #f07030;
  --gold:   #c8963c;
  --gold-l: #e8b84b;
  --bg:     #0a0c10;
  --bg1:    #0f1318;
  --bg2:    #151b24;
  --bg3:    #1c2434;
  --bg4:    #232d40;
  --line:   rgba(200,150,60,.15);
  --line2:  rgba(255,255,255,.07);
  --txt:    #cdd8ea;
  --txt2:   #6878a0;
  --txt3:   #303d55;
  --ok:     #27ae60;
  --bad:    #c0392b;
  --H:      54px;
  --TOC:    230px;
  --CMD:    270px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a { color:inherit; text-decoration:none }
button { font-family:inherit; cursor:pointer; border:none; background:none }

/* Ambiance */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(217,79,30,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 0%, rgba(200,150,60,.04) 0%, transparent 50%);
}

/* ════ HEADER ════ */
.hdr {
  position:fixed; top:0; left:0; right:0; z-index:900;
  height:var(--H);
  background:rgba(10,12,16,.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  display:flex; align-items:center;
  padding:0 1.5rem; gap:1rem;
}

.logo {
  font-family:'Cinzel',serif; font-weight:900; font-size:.95rem;
  color:var(--gold-l); letter-spacing:2px; cursor:pointer;
  flex-shrink:0; white-space:nowrap;
  text-shadow:0 0 24px rgba(232,184,75,.25);
  transition:opacity .2s;
}
.logo:hover { opacity:.8 }
.logo em { color:var(--fire); font-style:normal }

/* IP copiable */
.ip-chip {
  display:flex; align-items:center; gap:.4rem;
  background:var(--bg2); border:1px solid var(--line2);
  border-radius:6px; padding:.28rem .7rem;
  font-family:'Courier New',monospace; font-size:.75rem;
  color:var(--gold); cursor:pointer; flex-shrink:0;
  transition:all .2s; position:relative;
  user-select:none;
}
.ip-chip:hover { border-color:rgba(200,150,60,.35); background:var(--bg3) }
.ip-chip .icon { font-size:.72rem; opacity:.6 }
.ip-chip .tip {
  position:absolute; top:calc(100% + 5px); left:50%;
  transform:translateX(-50%);
  background:var(--ok); color:#fff;
  font-size:.68rem; font-weight:700; font-family:'Inter',sans-serif;
  padding:.18rem .45rem; border-radius:4px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.ip-chip.copied .tip { opacity:1 }

/* Nav onglets */
.hdr-nav {
  display:flex; align-items:center; gap:.1rem;
  flex:1; overflow-x:auto;
  scrollbar-width:none;
}
.hdr-nav::-webkit-scrollbar { display:none }
.tab {
  color:var(--txt2); font-size:.84rem; font-weight:500;
  padding:.32rem .8rem; border-radius:6px;
  transition:all .2s; white-space:nowrap;
}
.tab:hover { color:var(--txt); background:rgba(255,255,255,.05) }
.tab.active {
  color:var(--ember); background:rgba(217,79,30,.1);
  font-weight:600;
}

/* Recherche globale */
.hdr-search { position:relative; flex-shrink:0 }
.hdr-search input {
  background:var(--bg2); border:1px solid var(--line2);
  border-radius:20px; padding:.35rem 1rem .35rem 2rem;
  color:var(--txt); font-size:.83rem; width:200px;
  transition:all .2s; outline:none;
}
.hdr-search input:focus {
  width:260px; border-color:rgba(217,79,30,.45);
  background:var(--bg3); box-shadow:0 0 0 3px rgba(217,79,30,.07);
}
.hdr-search input::placeholder { color:var(--txt3) }
.hdr-search .s-ico {
  position:absolute; left:.65rem; top:50%; transform:translateY(-50%);
  font-size:.78rem; color:var(--txt3); pointer-events:none;
}
.search-drop {
  display:none; position:absolute; top:calc(100% + 6px);
  right:0; width:320px; z-index:999;
  background:var(--bg2); border:1px solid var(--line);
  border-radius:10px; overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.search-drop.on { display:block }
.sdrop-item {
  display:flex; align-items:center; gap:.65rem;
  padding:.65rem 1rem; cursor:pointer;
  border-bottom:1px solid var(--line2); transition:background .15s;
}
.sdrop-item:last-child { border-bottom:none }
.sdrop-item:hover { background:rgba(217,79,30,.07) }
.sdrop-icon { font-size:.95rem; flex-shrink:0 }
.sdrop-title { font-weight:600; font-size:.855rem }
.sdrop-sub { font-size:.72rem; color:var(--txt3); margin-top:.05rem }
.sdrop-empty { padding:.9rem 1rem; text-align:center; color:var(--txt3); font-size:.82rem }

/* Liens externes */
.hdr-ext { display:flex; gap:.4rem; flex-shrink:0 }
.btn-disc {
  background:#5865f2; color:#fff;
  padding:.3rem .8rem; border-radius:6px;
  font-size:.78rem; font-weight:600;
  display:flex; align-items:center; gap:.3rem;
  transition:all .2s;
}
.btn-disc:hover { background:#4752c4 }
.btn-kofi {
  background:#ff5e5b; color:#fff;
  padding:.3rem .8rem; border-radius:6px;
  font-size:.78rem; font-weight:600;
  transition:all .2s;
}
.btn-kofi:hover { background:#e54e4b }

/* ════ LAYOUT ════ */
.app {
  display:flex;
  padding-top:var(--H);
  min-height:100vh;
  position:relative; z-index:1;
}

/* ════ SIDEBAR GAUCHE — TOC ════ */
.toc-sidebar {
  width:var(--TOC); flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid var(--line2);
  position:sticky; top:var(--H);
  height:calc(100vh - var(--H));
  overflow-y:auto; padding:1.25rem 0 3rem;
  scrollbar-width:thin;
  scrollbar-color:var(--line2) transparent;
  transition:all .3s;
}
.toc-sidebar.hidden { display:none }

.toc-head {
  font-size:.63rem; font-weight:700; text-transform:uppercase;
  letter-spacing:2px; color:var(--txt3);
  padding:.2rem .9rem .8rem;
}
.toc-entry {
  display:flex; align-items:baseline; gap:.4rem;
  padding:.4rem .9rem .4rem 1.1rem;
  cursor:pointer; font-size:.82rem; color:var(--txt2);
  border-left:2px solid transparent;
  transition:all .15s; line-height:1.35;
}
.toc-entry:hover { color:var(--txt); background:rgba(255,255,255,.03) }
.toc-entry.h3 { padding-left:1.7rem; font-size:.78rem }
.toc-entry.active {
  color:var(--ember); border-left-color:var(--fire);
  background:rgba(217,79,30,.07); font-weight:600;
}
.toc-num { font-size:.66rem; color:var(--txt3); font-family:'Courier New',monospace; flex-shrink:0 }

/* ════ MAIN ════ */
.main {
  flex:1; min-width:0;
  padding:2.5rem 3rem;
}

/* Page */
.page { display:none; animation:fadeUp .22s ease }
.page.active { display:block }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px) }
  to   { opacity:1; transform:translateY(0) }
}

.page-head {
  margin-bottom:2rem;
  padding-bottom:1.1rem;
  border-bottom:1px solid var(--line2);
}
.page-title {
  font-family:'Cinzel',serif; font-size:1.75rem; font-weight:700;
  color:var(--gold-l); line-height:1.15;
}
.page-desc { color:var(--txt3); font-size:.855rem; margin-top:.4rem }

/* Contenu wiki */
.wc { line-height:1.8 }
.wc h2 {
  font-family:'Cinzel',serif; font-size:1.1rem; color:var(--ember);
  margin:2.25rem 0 .8rem;
  padding-left:.75rem; border-left:3px solid var(--fire);
  scroll-margin-top:calc(var(--H) + 1.5rem);
}
.wc h3 {
  font-size:.95rem; font-weight:700; color:var(--txt);
  margin:1.4rem 0 .4rem;
  scroll-margin-top:calc(var(--H) + 1.5rem);
}
.wc p { color:var(--txt2); margin-bottom:.75rem; font-size:.9rem }
.wc ul, .wc ol { padding-left:1.5rem; margin-bottom:.75rem }
.wc li { color:var(--txt2); font-size:.9rem; margin-bottom:.28rem }
.wc strong { color:var(--txt); font-weight:700 }
.wc em { color:var(--gold); font-style:italic }
.wc a { color:var(--ember); text-decoration:underline; text-underline-offset:2px }
.wc a:hover { color:var(--fire) }
.wc code {
  background:var(--bg4); border:1px solid var(--line2);
  border-radius:4px; padding:.08rem .38rem;
  font-family:'Courier New',monospace; font-size:.83rem; color:var(--ember);
}
.wc pre {
  background:var(--bg2); border:1px solid var(--line2);
  border-radius:8px; padding:1rem 1.2rem;
  overflow-x:auto; margin:1rem 0;
  cursor:pointer; transition:border-color .15s;
  position:relative;
}
.wc pre:hover { border-color:rgba(217,79,30,.35) }
/* Indicateur copie discret en haut à droite */
.wc pre::after {
  content:'📋';
  position:absolute; top:.5rem; right:.65rem;
  font-size:.75rem; opacity:0; transition:opacity .15s;
  pointer-events:none;
}
.wc pre:hover::after { opacity:.5 }
.wc pre.copied { border-color:rgba(39,174,96,.4) }
.wc pre.copied::after { content:'✓'; color:var(--ok); opacity:1; font-size:.85rem }
.wc pre code { background:none; border:none; padding:0; font-size:.84rem; color:var(--txt2) }
.wc blockquote {
  border-left:3px solid var(--gold);
  background:rgba(200,150,60,.05);
  padding:.8rem 1rem; border-radius:0 8px 8px 0; margin:1rem 0;
}
.wc blockquote p { margin:0; font-style:italic }
.wc hr { border:none; border-top:1px solid var(--line2); margin:1.75rem 0 }
.wc img { max-width:100%; border-radius:8px; border:1px solid var(--line2); margin:.5rem 0 }
.wc table { width:100%; border-collapse:collapse; margin:1rem 0; font-size:.875rem }
.wc th {
  padding:.5rem .85rem; background:var(--bg3);
  border:1px solid var(--line2); color:var(--ember);
  font-weight:700; text-align:left; font-size:.78rem;
  text-transform:uppercase; letter-spacing:.4px;
}
.wc td { padding:.5rem .85rem; border:1px solid var(--line2); color:var(--txt2) }
.wc tr:nth-child(even) td { background:rgba(255,255,255,.02) }
.tbl-wrap { overflow-x:auto; margin:1rem 0 }

/* ════ SIDEBAR DROITE — Commandes ════ */
.cmd-sidebar {
  width:var(--CMD); flex-shrink:0;
  background:var(--bg1);
  border-left:1px solid var(--line2);
  position:sticky; top:var(--H);
  height:calc(100vh - var(--H));
  overflow-y:auto; padding:1.25rem .9rem 3rem;
  scrollbar-width:thin;
  scrollbar-color:var(--line2) transparent;
}
.cmd-sidebar.hidden { display:none }

.cmd-head { font-size:.63rem; font-weight:700; text-transform:uppercase;
  letter-spacing:2px; color:var(--txt3); margin-bottom:.75rem }
.cmd-input-wrap { position:relative; margin-bottom:.85rem }
.cmd-input-wrap input {
  width:100%; background:var(--bg3); border:1px solid var(--line2);
  border-radius:8px; padding:.5rem .75rem .5rem 2.1rem;
  color:var(--txt); font-size:.84rem; outline:none;
  transition:all .2s;
}
.cmd-input-wrap input:focus {
  border-color:rgba(217,79,30,.5); background:var(--bg4);
  box-shadow:0 0 0 3px rgba(217,79,30,.07);
}
.cmd-input-wrap input::placeholder { color:var(--txt3) }
.cmd-input-wrap .ico {
  position:absolute; left:.65rem; top:50%; transform:translateY(-50%);
  font-size:.8rem; color:var(--txt3); pointer-events:none;
}
.cmd-list { display:flex; flex-direction:column; gap:.5rem }
.cmd-card {
  background:var(--bg2); border:1px solid var(--line2);
  border-radius:8px; padding:.7rem .85rem; transition:all .15s;
  cursor:pointer; user-select:none;
}
.cmd-card:hover { border-color:rgba(217,79,30,.3); background:var(--bg3) }
.cmd-card.copied { border-color:rgba(39,174,96,.4) }
.cmd-name {
  font-family:'Courier New',monospace; font-size:.85rem;
  color:var(--ember); font-weight:700; margin-bottom:.18rem;
}
.cmd-alts { font-size:.72rem; color:var(--txt3); margin-bottom:.18rem }
.cmd-desc { font-size:.78rem; color:var(--txt2); line-height:1.45 }
.cmd-empty { color:var(--txt3); font-size:.82rem; text-align:center; padding:1.5rem 0 }

/* ════ PAGE PRÉSENTATION ════ */
.hero {
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:3.5rem 2rem 3rem;
  max-width:680px; margin:0 auto;
}
.hero-icon { font-size:3.5rem; margin-bottom:1.25rem }
.hero-title {
  font-family:'Cinzel',serif; font-size:2.6rem; font-weight:900;
  color:var(--gold-l); line-height:1.1; margin-bottom:.75rem;
  text-shadow:0 0 50px rgba(232,184,75,.2);
}
.hero-title em { color:var(--fire); font-style:normal }
.hero-sub {
  color:var(--txt2); font-size:.95rem; line-height:1.75;
  margin-bottom:2rem; max-width:500px;
}
.hero-stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:.75rem; width:100%; max-width:480px; margin-bottom:2rem;
}
.hstat {
  background:var(--bg2); border:1px solid var(--line2);
  border-radius:10px; padding:1rem .75rem; text-align:center;
}
.hstat-n {
  font-family:'Cinzel',serif; font-size:1.5rem; color:var(--fire);
  display:block; margin-bottom:.2rem;
}
.hstat-l { font-size:.68rem; text-transform:uppercase; letter-spacing:1px; color:var(--txt3) }
.hero-ip {
  display:flex; align-items:center; gap:.6rem;
  background:var(--bg2); border:1px solid var(--line);
  border-radius:10px; padding:.65rem 1.3rem;
  font-family:'Courier New',monospace; font-size:.9rem; color:var(--gold);
  cursor:pointer; transition:all .2s; position:relative; user-select:none;
}
.hero-ip:hover { background:var(--bg3); border-color:rgba(200,150,60,.35) }
.hero-ip .tip {
  position:absolute; bottom:calc(100% + 5px); left:50%; transform:translateX(-50%);
  background:var(--ok); color:#fff;
  font-size:.68rem; font-weight:700; font-family:'Inter',sans-serif;
  padding:.18rem .45rem; border-radius:4px; white-space:nowrap;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.hero-ip.copied .tip { opacity:1 }

/* ════ TOAST ════ */
#toast {
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999;
  padding:.65rem 1.15rem; border-radius:8px;
  background:var(--bg3); border:1px solid var(--line2);
  font-size:.83rem; font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  transform:translateY(60px); opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
#toast.on { transform:translateY(0); opacity:1 }
#toast.ok  { border-color:rgba(39,174,96,.4); color:var(--ok) }
#toast.err { border-color:rgba(192,57,43,.4); color:var(--bad) }
#toast.info{ border-color:rgba(200,150,60,.4); color:var(--gold) }

/* Scrollbar */
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:rgba(217,79,30,.2); border-radius:3px }
::-webkit-scrollbar-thumb:hover { background:rgba(217,79,30,.4) }
</style>
</head>

      desc: 'Les règles à respecter sur le serveur Dragon SMP.',
      content: `## Introduction

Bienvenue sur le **Dragon SMP**. Ce règlement s'applique à tous les joueurs sans exception. Le non-respect de ces règles entraîne des sanctions pouvant aller jusqu'au ban définitif.

## Comportement

### Respect mutuel

Le respect est la base de toute communauté. Aucune insulte, moquerie, discrimination ou harcèlement ne sera toléré, que ce soit en jeu, sur Discord ou sur ce wiki.

### Spam et publicité

Le spam de messages répétitifs et la publicité pour d'autres serveurs sont interdits dans tous nos espaces de communication.

## Jeu équitable

### Anti-triche

L'utilisation de clients modifiés, hacks, macros automatiques ou tout exploit de bug est strictement interdite. En cas de doute, demandez à un membre du staff.

### Anti-grief

Détruire, modifier ou voler dans les constructions d'autres joueurs sans leur accord explicite est interdit. Cela inclut les fermes, maisons et infrastructures publiques.

### PvP

Le PvP est autorisé uniquement dans les zones dédiées ou avec accord mutuel des deux joueurs. Le kill stealing et le spawn killing sont interdits.

## Staff

### Décisions

Les décisions du staff sont finales. Si vous pensez qu'une décision est injuste, ouvrez un ticket sur Discord — ne discutez pas en jeu.

### Sanctions

| Infraction | 1ère fois | 2ème fois | 3ème fois |
|---|---|---|---|
| Insulte | Warn | Mute 24h | Ban 7j |
| Grief mineur | Warn + réparation | Ban 7j | Ban définitif |
| Triche | Ban 30j | Ban définitif | — |
| Grief majeur | Ban définitif | — | — |`
    },
    {

async function loadData() {
  // Toujours charger depuis JSONbin en premier — le cache n'est qu'un fallback réseau
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
      { headers: { 'X-Master-Key': BIN_KEY } });
    if (r.ok) {
      DATA = (await r.json()).record;
      localStorage.setItem('dsmp_cache', JSON.stringify(DATA));
      return;
    }
  } catch {}

  // Fallback : cache local si pas de réseau
  try {
    const c = localStorage.getItem('dsmp_cache');
    if (c) { DATA = JSON.parse(c); return; }
  } catch {}

  DATA = JSON.parse(JSON.stringify(DEFAULTS));
}

/* ─── Navigation ────────────────────────────────────────── */
function buildNav() {
  const nav = document.getElementById('hdr-nav');
  nav.innerHTML = '';

    btn.className = 'tab' + (p.id === _cur ? ' active' : '');

    btn.textContent = `${p.icon || ''} ${p.title}`;
    btn.onclick = () => goPage(p.id);
    nav.appendChild(btn);

function buildPages() {
  const container = document.getElementById('dynamic-pages');
  container.innerHTML = '';
  (DATA?.pages || []).filter(p => !p.isSpecial).forEach(p => {
    const div = document.createElement('div');
    div.className = 'page';
    div.id = `page-${p.id}`;
    div.innerHTML = `
      <div class="page-head">
        <h1 class="page-title">${p.icon || ''} ${e(p.title)}</h1>
        ${p.desc ? `<p class="page-desc">${e(p.desc)}</p>` : ''}
      </div>
      <div class="wc" id="wc-${p.id}">${mdToHtml(p.content || '')}</div>`;
    container.appendChild(div);
  });
  // Injecte les boutons copie dans chaque bloc <pre>
  injectCopyButtons();
}

function injectCopyButtons() {
  document.querySelectorAll('.wc pre').forEach(pre => {
    if (pre.dataset.copyBound) return;
    pre.dataset.copyBound = '1';
    pre.title = 'Cliquer pour copier';
    pre.onclick = () => {
      const code = pre.querySelector('code')?.innerText || pre.innerText;
      const doCopy = () => {
        const ta = document.createElement('textarea');
        ta.value = code; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
      };
      (navigator.clipboard?.writeText(code) ?? Promise.reject()).catch(doCopy);
      pre.classList.add('copied');
      setTimeout(() => pre.classList.remove('copied'), 2000);
    };
  });
}

function goPage(id) {
  const page = (DATA?.pages || []).find(p => p.id === id);
  if (!page) { goPage('presentation'); return; }

  _cur = id;
  location.hash = id;

  // Active onglet
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.id === id);
  });

  // Affiche la bonne page
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`page-${id}`);
  if (el) el.classList.add('active');

  // TOC
  const tocSB = document.getElementById('toc-sidebar');
  if (page.showToc && !page.isSpecial) {
    tocSB.classList.remove('hidden');
    buildTOC(id);
  } else {
    tocSB.classList.add('hidden');
  }

  // Commandes
  const cmdSB = document.getElementById('cmd-sidebar');
  if (page.showCmds && !page.isSpecial) {
    cmdSB.classList.remove('hidden');
    renderCmds(DATA?.commands || DEFAULTS.commands);
    document.getElementById('cmd-q').value = '';
  } else {
    cmdSB.classList.add('hidden');
  }

  window.scrollTo(0, 0);
}

/* ─── TOC ───────────────────────────────────────────────── */
function buildTOC(pageId) {
  const page = DATA.pages.find(p => p.id === pageId);
  if (!page?.content) return;

  const links = document.getElementById('toc-links');
  const entries = [];
  page.content.split('\n').forEach(line => {
    const m2 = line.match(/^## (.+)$/);
    const m3 = line.match(/^### (.+)$/);
    if (m2) entries.push({ lvl: 2, text: m2[1], id: slug(m2[1]) });
    if (m3) entries.push({ lvl: 3, text: m3[1], id: slug(m3[1]) });
  });

  if (!entries.length) { links.innerHTML = ''; return; }

  links.innerHTML = entries.map(e2 => `
    <div class="toc-entry${e2.lvl === 3 ? ' h3' : ''}" data-tgt="${e2.id}"
      onclick="scrollTo2('${e2.id}',this)">
      <span class="toc-num">${e2.lvl === 2 ? '#' : '·'}</span>
      ${e(e2.text)}
    </div>`).join('');

  // Injecte les IDs dans le DOM
  setTimeout(() => {
    const wc = document.querySelector(`#wc-${pageId}`);
    if (!wc) return;
    wc.querySelectorAll('h2,h3').forEach(h => { h.id = slug(h.textContent) });
    setupScrollSpy(pageId);
  }, 80);
}

function scrollTo2(id, el) {
  const target = document.getElementById(id);
  if (!target) return;
  const y = target.getBoundingClientRect().top + window.scrollY - parseInt(getComputedStyle(document.documentElement).getPropertyValue('--H')) - 20;
  window.scrollTo({ top: y, behavior: 'smooth' });
  document.querySelectorAll('.toc-entry').forEach(t => t.classList.remove('active'));
  el?.classList.add('active');
}

function setupScrollSpy(pageId) {
  // On utilise scroll event plutôt qu'IntersectionObserver
  // pour un suivi précis sans glissement sur les sections courtes
  const headings = [...document.querySelectorAll(`#wc-${pageId} h2, #wc-${pageId} h3`)];
  if (!headings.length) return;

  function onScroll() {
    const H = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--H')) || 54;
    const offset = H + 40;
    let active = headings[0];
    for (const h of headings) {
      if (h.getBoundingClientRect().top <= offset) active = h;
      else break;
    }
    document.querySelectorAll('.toc-entry').forEach(t => {
      t.classList.toggle('active', t.dataset.tgt === active.id);
    });
  }

  // Nettoie l'ancien listener si on recharge la page
  if (window._scrollSpyHandler) window.removeEventListener('scroll', window._scrollSpyHandler);
  window._scrollSpyHandler = onScroll;
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // init
}

/* ─── Recherche globale ─────────────────────────────────── */
function setupGlobalSearch() {
  const inp  = document.getElementById('gsearch');
  const drop = document.getElementById('gsearch-drop');
  if (!inp || !drop) return;

  let t;
  inp.addEventListener('input', () => { clearTimeout(t); t = setTimeout(() => doGSearch(inp.value.trim()), 180) });
  inp.addEventListener('focus', () => { if (inp.value.trim()) doGSearch(inp.value.trim()) });
  document.addEventListener('click', ev => {
    if (!ev.target.closest('.hdr-search')) { drop.classList.remove('on'); inp.value = '' }
  });
}

function doGSearch(q) {
  const drop = document.getElementById('gsearch-drop');
  if (!q) { drop.classList.remove('on'); return; }
  const ql = q.toLowerCase();
  const results = [];

  // Extrait un extrait de contexte autour du mot trouvé
  function excerpt(text, query) {
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return '';
    const start = Math.max(0, idx - 40);
    const end   = Math.min(text.length, idx + query.length + 60);
    let snip = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
    // Met en gras le mot trouvé
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    snip = snip.replace(re, '<mark style="background:rgba(217,79,30,.3);color:var(--ember);border-radius:2px;padding:0 2px">$1</mark>');
    return snip;
  }

  // Pages — scan paragraphe par paragraphe pour trouver l'endroit exact
  (DATA?.pages || []).filter(p => !p.isSpecial).forEach(p => {
    const titleMatch = p.title.toLowerCase().includes(ql);
    const descMatch  = (p.desc || '').toLowerCase().includes(ql);
    const content    = p.content || '';

    if (titleMatch || descMatch) {
      results.push({
        icon: p.icon || '📄',
        title: p.title,
        sub: descMatch ? excerpt(p.desc, q) : `Page — ${p.desc || ''}`,
        action: () => goPage(p.id)
      });
    }

    // Scan le contenu ligne par ligne — trouve le chapitre le plus proche
    let currentH2 = null, currentH2Id = null;
    const lines = content.split('\n');
    const foundHeadings = new Set();

    lines.forEach(line => {
      const h2m = line.match(/^## (.+)$/);
      const h3m = line.match(/^### (.+)$/);
      if (h2m) { currentH2 = h2m[1]; currentH2Id = slug(h2m[1]); }

      // Le mot est dans ce chapitre (titre)
      if (h2m && h2m[1].toLowerCase().includes(ql) && !foundHeadings.has(currentH2Id)) {
        foundHeadings.add(currentH2Id);
        results.push({
          icon: p.icon || '📄',
          title: `${p.title} › ${h2m[1]}`,
          sub: `Chapitre correspondant`,
          action: () => goPageAndScroll(p.id, currentH2Id)
        });
      }
      if (h3m && h3m[1].toLowerCase().includes(ql)) {
        const h3id = slug(h3m[1]);
        if (!foundHeadings.has(h3id)) {
          foundHeadings.add(h3id);
          results.push({
            icon: p.icon || '📄',
            title: `${p.title} › ${h3m[1]}`,
            sub: currentH2 ? `Dans : ${currentH2}` : '',
            action: () => goPageAndScroll(p.id, h3id)
          });
        }
      }

      // Le mot est dans le texte de cette ligne (pas un titre)
      if (!h2m && !h3m && line.toLowerCase().includes(ql) && currentH2Id && !foundHeadings.has(currentH2Id + '_content')) {
        foundHeadings.add(currentH2Id + '_content');
        const clean = line.replace(/[*_`#>]/g, '').trim();
        results.push({
          icon: '🔍',
          title: `${p.title} › ${currentH2 || 'Introduction'}`,
          sub: excerpt(clean, q),
          action: () => goPageAndScroll(p.id, currentH2Id)
        });
      }
    });
  });

  // Commandes (avec mots-clés)
  (DATA?.commands || DEFAULTS.commands).forEach(c => {
    const kws = (c.kw || '').split(',').map(k => k.trim().toLowerCase());
    if (c.cmd.toLowerCase().includes(ql) ||
        (c.alts || '').toLowerCase().includes(ql) ||
        (c.desc || '').toLowerCase().includes(ql) ||
        kws.some(k => k.includes(ql))) {
      results.push({
        icon: '⌨️',
        title: c.cmd,
        sub: c.desc,
        action: () => {
          goPage('wiki');
          setTimeout(() => { document.getElementById('cmd-q').value = q; doCmd(q); }, 200);
        }
      });
    }
  });

  if (!results.length) {
    drop.innerHTML = `<div class="sdrop-empty">Aucun résultat pour « ${e(q)} »</div>`;
  } else {
    drop.innerHTML = results.slice(0, 10).map((r, i) => `
      <div class="sdrop-item" onclick="sdrClick(${i})">
        <span class="sdrop-icon">${r.icon}</span>
        <div style="min-width:0">
          <div class="sdrop-title">${e(r.title)}</div>
          <div class="sdrop-sub">${r.sub}</div>
        </div>
      </div>`).join('');
    window._sdrActions = results.map(r => r.action);
  }
  drop.classList.add('on');
}

// Navigue vers une page ET scroll vers un heading précis
function goPageAndScroll(pageId, headingId) {
  goPage(pageId);
  // Attend que la page soit rendue + TOC construite
  setTimeout(() => {
    const target = document.getElementById(headingId);
    if (target) {
      const H = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--H')) || 54;
      window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - H - 20, behavior: 'smooth' });
      // Highlight le bon item TOC
      document.querySelectorAll('.toc-entry').forEach(t => {
        t.classList.toggle('active', t.dataset.tgt === headingId);
      });
    }
  }, 200);
}

function sdrClick(i) {
  document.getElementById('gsearch-drop').classList.remove('on');
  document.getElementById('gsearch').value = '';
  if (window._sdrActions?.[i]) window._sdrActions[i]();
}

function doCmd(q) {

  const res = (DATA?.commands || DEFAULTS.commands).filter(c => {
    const kws = (c.kw || '').split(',').map(k => k.trim().toLowerCase());
    return c.cmd.toLowerCase().includes(ql) ||

           (c.desc || '').toLowerCase().includes(ql) ||

      <div class="cmd-desc">${e(c.desc)}</div>
    </div>`).join('');

function copyCmd(card, cmd) {
  const doCopy = () => {
    const ta = document.createElement('textarea');
    ta.value = cmd; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  };
  (navigator.clipboard?.writeText(cmd) ?? Promise.reject()).catch(doCopy);
  card.classList.add('copied');
  const nameEl = card.querySelector('.cmd-name');

    nameEl.style.color = '';

/* ─── Markdown ──────────────────────────────────────────── */
function mdToHtml(raw) {
  if (!raw) return '';
  let s = raw;
  const codeBlocks = [];
  s = s.replace(/```([\s\S]*?)```/g, (_, c) => { codeBlocks.push(c); return `\x00B${codeBlocks.length - 1}\x00` });
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  s = s.replace(/^---$/gm, '<hr>');
  // Tables
  s = s.replace(/(\|.+\|\n)(\|[-| :]+\|\n)((?:\|.+\|?\n?)*)/g, (_, h, __, b) => {
    const ths = h.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const trs = b.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<div class="tbl-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  });
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/((?:^- .+\n?)+)/gm, m => {
    const li = m.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
    return `<ul>${li}</ul>`;
  });
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
    const li = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
    return `<ol>${li}</ol>`;
  });
  // Paragraphes
  s = s.replace(/\n{2,}/g, '</p><p>');
  s = `<p>${s}</p>`;
  s = s.replace(/<p>\s*(<(?:h[1-6]|ul|ol|pre|blockquote|hr|div)[^>]*>)/g, '$1');
  s = s.replace(/(<\/(?:h[1-6]|ul|ol|pre|blockquote|hr|div)>)\s*<\/p>/g, '$1');
  s = s.replace(/<p>\s*<\/p>/g, '');
  // Blocs de code
  s = s.replace(/\x00B(\d+)\x00/g, (_, i) => {
    const code = codeBlocks[+i].replace(/^\n/, '').replace(/\n$/, '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return `<pre><code>${code}</code></pre>`;
  });
  return s.trim();
}

/* ─── Utils ─────────────────────────────────────────────── */
function e(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function slug(s) {
  return String(s || '').toLowerCase()
    .replace(/[àáâã]/g, 'a').replace(/[èéêë]/g, 'e').replace(/[ìíîï]/g, 'i')
    .replace(/[òóô]/g, 'o').replace(/[ùúûü]/g, 'u').replace(/ç/g, 'c')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; t.className = `on ${type}`;
  setTimeout(() => t.className = '', 3000);
}
</script>
