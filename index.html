<style>
/* ════════════════════════════════════════════════════════════════
   DRAGON SMP WIKI V3 — index.html
   Design : forge sombre, lave & acier, typographie épique
   Mobile-first, tout dans un seul fichier
════════════════════════════════════════════════════════════════ */

:root {
  --lava:    #d94f1e;
  --ember:   #f07030;
  --gold:    #d4a843;
  --gold2:   #9a7828;
  --steel:   #8090a8;
  --bg0:     #080a0d;
  --bg1:     #0e1118;
  --bg2:     #141820;
  --bg3:     #1c2230;
  --bg4:     #242c3c;
  --line:    rgba(212,168,67,.12);
  --line2:   rgba(255,255,255,.06);
  --txt:     #cdd5e0;
  --txt2:    #7888a0;
  --txt3:    #3a4458;
  --ok:      #2ecc71;
  --bad:     #e74c3c;
  --warn:    #e67e22;
  --H:       58px;
  --SW:      260px;
  --R:       8px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg0);color:var(--txt);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit;outline:none}
img{max-width:100%;border-radius:var(--R)}

/* ── Grain overlay ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px;opacity:.5;
}
/* ── Glow bas de page ── */
body::after{
  content:'';position:fixed;bottom:0;left:0;right:0;height:40vh;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(217,79,30,.1) 0%,transparent 70%);
}

/* ════════════════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════════════════ */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:var(--H);
  background:rgba(8,10,13,.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:.75rem;padding:0 1rem;
}
.hdr-logo{
  font-family:'Cinzel',serif;font-weight:900;font-size:1rem;
  letter-spacing:2px;white-space:nowrap;flex-shrink:0;
  color:var(--gold);text-shadow:0 0 20px rgba(212,168,67,.3);
}
.hdr-logo em{color:var(--lava);font-style:normal}

/* Barre de recherche */
.hdr-search{flex:1;max-width:340px;position:relative;margin-left:.5rem}
.hdr-search input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line2);border-radius:20px;
  padding:.42rem 1rem .42rem 2.1rem;
  color:var(--txt);font-size:.875rem;
  transition:all .2s;
  -webkit-appearance:none;appearance:none;
}
.hdr-search input::placeholder{color:var(--txt3)}
.hdr-search input:focus{
  border-color:rgba(217,79,30,.5);
  background:rgba(217,79,30,.06);
  box-shadow:0 0 0 3px rgba(217,79,30,.08);
}
.hdr-search .ico{
  position:absolute;left:.7rem;top:50%;transform:translateY(-50%);
  color:var(--txt3);font-size:.8rem;pointer-events:none;
}

/* Dropdown recherche */
.search-drop{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--R);overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:950;
  max-height:300px;overflow-y:auto;
}
.search-drop.on{display:block}
.s-item{
  padding:.65rem 1rem;cursor:pointer;
  border-bottom:1px solid var(--line2);transition:background .15s;
  display:flex;align-items:center;gap:.6rem;
}
.s-item:last-child{border-bottom:none}
.s-item:hover{background:rgba(217,79,30,.08)}
.s-item-icon{font-size:1rem;flex-shrink:0}
.s-item-title{font-weight:600;font-size:.875rem;color:var(--txt)}
.s-item-cat{font-size:.72rem;color:var(--txt3);margin-top:.1rem}
.s-empty{padding:1rem;text-align:center;color:var(--txt3);font-size:.85rem}

/* Liens header */
.hdr-links{display:flex;gap:.4rem;align-items:center;margin-left:auto;flex-shrink:0}
.btn-disc{
  background:#5865f2;color:#fff;border:none;
  padding:.38rem .85rem;border-radius:6px;font-size:.8rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:.35rem;
  transition:all .2s;white-space:nowrap;
}
.btn-disc:hover{background:#4752c4;transform:translateY(-1px)}
.btn-kofi{
  background:#ff5e5b;color:#fff;border:none;
  padding:.38rem .85rem;border-radius:6px;font-size:.8rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:.35rem;
  transition:all .2s;white-space:nowrap;
}
.btn-kofi:hover{background:#e54e4b;transform:translateY(-1px)}

/* Hamburger */
.burger{
  display:none;flex-direction:column;gap:5px;
  background:none;border:none;cursor:pointer;
  color:var(--txt);padding:.4rem;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.burger span{
  display:block;width:20px;height:2px;
  background:currentColor;border-radius:2px;transition:all .3s;
}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ════════════════════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════════════════════ */
.layout{
  display:flex;min-height:100vh;
  padding-top:var(--H);position:relative;z-index:1;
}

/* ════════════════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════════════════ */
.sidebar{
  width:var(--SW);min-width:var(--SW);flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid var(--line2);
  height:calc(100vh - var(--H));
  position:sticky;top:var(--H);
  overflow-y:auto;overflow-x:hidden;
  padding:1rem 0 3rem;
  scrollbar-width:thin;scrollbar-color:var(--line2) transparent;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}

/* Statut MC */
.mc-box{
  margin:.25rem .75rem 1rem;
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:var(--R);padding:.65rem .85rem;
  font-size:.78rem;cursor:default;
}
.mc-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem}
.mc-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  transition:background .3s;
}
.mc-dot.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.mc-dot.off{background:var(--bad)}
.mc-dot.maint{background:var(--warn);box-shadow:0 0 6px var(--warn)}
.mc-status-txt{color:var(--txt2);font-weight:500}
.mc-ip{
  font-family:monospace;font-size:.8rem;color:var(--gold);
  letter-spacing:.5px;margin-top:.1rem;
}

/* Catégories + pages */
.cat-block{margin-bottom:.25rem}
.cat-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem .85rem;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.cat-head:hover{background:rgba(255,255,255,.02)}
.cat-head-l{display:flex;align-items:center;gap:.5rem}
.cat-icon{font-size:.85rem}
.cat-label{
  font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;
  color:var(--txt3);
}
.cat-arrow{font-size:.6rem;color:var(--txt3);transition:transform .2s}
.cat-block.open .cat-arrow{transform:rotate(90deg)}
.cat-pages{display:none}
.cat-block.open .cat-pages{display:block}

.pg-link{
  display:flex;align-items:center;gap:.55rem;
  padding:.5rem .85rem .5rem 1.6rem;
  cursor:pointer;color:var(--txt2);font-size:.875rem;
  border-left:2px solid transparent;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.pg-link:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.pg-link.active{
  color:var(--ember);font-weight:600;
  border-left-color:var(--lava);
  background:rgba(217,79,30,.08);
}
.pg-link-ico{font-size:.9rem;flex-shrink:0}

.sidebar-div{
  height:1px;background:var(--line2);
  margin:.5rem .85rem;
}

/* ════════════════════════════════════════════════════════════════
   MAIN CONTENT
════════════════════════════════════════════════════════════════ */
.main{
  flex:1;min-width:0;
  padding:2.5rem 3rem;
  max-width:860px;
}

/* Page view */
.pv{animation:fadeUp .25s ease both}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.pv-head{
  margin-bottom:2rem;padding-bottom:1.25rem;
  border-bottom:1px solid var(--line2);
}
.pv-title{
  font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;
  color:var(--gold);line-height:1.15;
  text-shadow:0 0 30px rgba(212,168,67,.15);
}
.pv-desc{color:var(--txt3);font-size:.875rem;margin-top:.5rem;line-height:1.5}

/* Contenu wiki */
.wc h1{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold);margin:2rem 0 .75rem}
.wc h2{
  font-family:'Cinzel',serif;font-size:1.1rem;color:var(--ember);
  margin:2rem 0 .75rem;padding-left:.75rem;
  border-left:3px solid var(--lava);
}
.wc h3{font-size:.95rem;font-weight:700;color:var(--txt);margin:1.25rem 0 .4rem}
.wc p{color:var(--txt2);margin-bottom:.75rem;font-size:.9rem;line-height:1.8}
.wc ul,.wc ol{padding-left:1.4rem;margin-bottom:.75rem}
.wc li{color:var(--txt2);font-size:.9rem;margin-bottom:.3rem;line-height:1.65}
.wc strong{color:var(--txt);font-weight:700}
.wc em{color:var(--gold);font-style:italic}
.wc a{color:var(--ember);text-decoration:underline;text-underline-offset:2px}
.wc a:hover{color:var(--lava)}
.wc code{
  background:var(--bg4);border:1px solid var(--line2);
  border-radius:4px;padding:.1rem .4rem;
  font-family:'Courier New',monospace;font-size:.83rem;color:var(--ember);
}
.wc pre{
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:var(--R);padding:1.1rem 1.25rem;overflow-x:auto;
  margin:1rem 0;position:relative;
}
.wc pre::before{
  content:'CODE';position:absolute;top:.5rem;right:.75rem;
  font-size:.62rem;letter-spacing:1.5px;color:var(--txt3);font-weight:700;
}
.wc pre code{
  background:none;border:none;padding:0;
  font-size:.85rem;color:var(--txt2);line-height:1.6;
}
.wc blockquote{
  border-left:3px solid var(--gold2);
  background:rgba(212,168,67,.05);
  padding:.85rem 1.1rem;border-radius:0 var(--R) var(--R) 0;
  margin:1rem 0;
}
.wc blockquote p{color:var(--txt2);margin:0;font-style:italic}
.wc hr{border:none;border-top:1px solid var(--line2);margin:1.75rem 0}
.wc img{border-radius:var(--R);margin:.5rem 0;border:1px solid var(--line2)}
.wc table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.875rem}
.wc th{
  padding:.5rem .85rem;background:var(--bg3);
  border:1px solid var(--line2);color:var(--ember);
  font-weight:700;text-align:left;font-size:.8rem;
  text-transform:uppercase;letter-spacing:.5px;
}
.wc td{padding:.5rem .85rem;border:1px solid var(--line2);color:var(--txt2)}
.wc tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.wc .table-wrap{overflow-x:auto;margin:1rem 0}

/* ════════════════════════════════════════════════════════════════
   OVERLAY MOBILE
════════════════════════════════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.75);
  -webkit-tap-highlight-color:transparent;
}
.overlay.on{display:block}

/* ════════════════════════════════════════════════════════════════
   FOOTER
════════════════════════════════════════════════════════════════ */
.footer{
  text-align:center;padding:1.5rem 1rem;
  color:var(--txt3);font-size:.78rem;
  border-top:1px solid var(--line2);
  position:relative;z-index:1;
  line-height:2;
}
.footer a{color:var(--txt3);transition:color .15s}
.footer a:hover{color:var(--ember)}
.footer .sep{margin:0 .5rem;opacity:.3}

/* ════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;
  padding:.7rem 1.2rem;border-radius:var(--R);
  background:var(--bg3);border:1px solid var(--line2);
  font-size:.85rem;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  transform:translateY(60px);opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;max-width:280px;
}
#toast.on{transform:translateY(0);opacity:1}
#toast.ok{border-color:rgba(46,204,113,.4);color:var(--ok)}
#toast.err{border-color:rgba(231,76,60,.4);color:var(--bad)}
#toast.info{border-color:rgba(212,168,67,.4);color:var(--gold)}

/* ════════════════════════════════════════════════════════════════
   BOUTONS
════════════════════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.48rem 1rem;border:none;border-radius:6px;
  font-size:.875rem;font-weight:600;cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.btn-fire{background:var(--lava);color:#fff}
.btn-fire:hover{background:#bf4118;transform:translateY(-1px);box-shadow:0 4px 16px rgba(217,79,30,.35)}
.btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--line2)}
.btn-ghost:hover{background:var(--bg3);color:var(--txt)}
.btn-red{background:rgba(231,76,60,.12);color:var(--bad);border:1px solid rgba(231,76,60,.2)}
.btn-red:hover{background:rgba(231,76,60,.22)}
.btn-sm{padding:.3rem .75rem;font-size:.78rem}

/* ════════════════════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  .burger{display:flex}
  .btn-kofi{display:none}
  .hdr-search{max-width:none}

  .sidebar{
    position:fixed;top:var(--H);left:0;bottom:0;
    z-index:850;transform:translateX(-100%);
    height:calc(100vh - var(--H));
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  .sidebar.open{transform:translateX(0)}

  .main{padding:1.25rem 1rem 2rem}
  .pv-title{font-size:1.4rem}
  .wc h2{font-size:1rem}
}
@media(min-width:769px){
  .burger{display:none!important}
}
@media(max-width:480px){
  .btn-disc span{display:none}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(217,79,30,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(217,79,30,.4)}
</style>
</head>

### Protection

\`/claim\` — Protéger une chunk
\`/unclaim\` — Retirer la protection
\`/trust [joueur]\` — Donner accès`
    }
  ],
  settings:{
    maintenance:false,
    maintMsg:'Le serveur est actuellement en maintenance.',
    mcHost:'163.5.141.232',
    mcPort:25816,
    mcIp:'connect.axohosts.fr:25883'
  }
};

/* ── Persistance ─────────────────────────────────────────────── */
let DATA = null;

async function loadData(){
  const binId  = localStorage.getItem('dsmp_bin_id');
  const apiKey = localStorage.getItem('dsmp_api_key');
  if(binId && apiKey){
    try{
      const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`,
        {headers:{'X-Master-Key':apiKey}});
      if(r.ok){
        const j = await r.json();
        DATA = j.record;
        localStorage.setItem('dsmp_cache', JSON.stringify(DATA));
        return;
      }
    }catch{}
  }
  // Fallback cache local
  const cached = localStorage.getItem('dsmp_cache');
  if(cached){ try{ DATA = JSON.parse(cached); return; }catch{} }
  // Défaut
  DATA = JSON.parse(JSON.stringify(DEFAULTS));
}

async function saveData(){
  if(!DATA) return;
  localStorage.setItem('dsmp_cache', JSON.stringify(DATA));
  const binId  = localStorage.getItem('dsmp_bin_id');
  const apiKey = localStorage.getItem('dsmp_api_key');
  if(binId && apiKey){
    try{
      await fetch(`https://api.jsonbin.io/v3/b/${binId}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':apiKey},
        body:JSON.stringify(DATA)
      });
    }catch{}
  }
}

/* ── Init ────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async ()=>{
  await loadData();
  buildSidebar();
  setupSearch();
  setupBurger();
  startMC();

  const hash = location.hash.replace('#','');
  goTo(hash || getFirstId());
});

window.addEventListener('hashchange',()=>{
  const id = location.hash.replace('#','');
  if(id) goTo(id);
});

function getFirstId(){
  if(!DATA?.pages?.length) return null;
  const acc = DATA.pages.find(p=>p.id==='accueil');
  return acc ? acc.id : DATA.pages[0].id;
}

/* ── Sidebar ─────────────────────────────────────────────────── */
function buildSidebar(){
  const nav = document.getElementById('sb-nav');
  if(!nav || !DATA) return;

  const cats = [...(DATA.categories||[])].sort((a,b)=>(a.order||0)-(b.order||0));
  let html = '';

  cats.forEach(cat=>{
    const pages = (DATA.pages||[])
      .filter(p=>p.catId===cat.id)
      .sort((a,b)=>(a.order||0)-(b.order||0));
    if(!pages.length) return;

    const isOpen = pages.some(p=>p.id===_curId);
    html += `<div class="cat-block${isOpen?' open':''}" data-cat="${cat.id}">
      <div class="cat-head" onclick="toggleCat('${cat.id}')">
        <div class="cat-head-l">
          <span class="cat-icon">${cat.icon||'📁'}</span>
          <span class="cat-label">${e(cat.name)}</span>
        </div>
        <span class="cat-arrow">▶</span>
      </div>
      <div class="cat-pages">`;
    pages.forEach(p=>{
      html += `<div class="pg-link${p.id===_curId?' active':''}" data-id="${p.id}" onclick="goTo('${p.id}')">
        <span class="pg-link-ico">${p.icon||'📄'}</span>${e(p.title)}
      </div>`;
    });
    html += `</div></div><div class="sidebar-div"></div>`;
  });

  if(!html) html = `<div style="padding:1rem .85rem;color:var(--txt3);font-size:.82rem">Aucune page disponible.</div>`;
  nav.innerHTML = html;
}

function toggleCat(id){
  document.querySelector(`.cat-block[data-cat="${id}"]`)?.classList.toggle('open');
}

/* ── Navigation ──────────────────────────────────────────────── */
let _curId = null;

function goTo(id){
  const page = DATA?.pages?.find(p=>p.id===id||p.slug===id);
  if(!page) return;
  _curId = page.id;
  location.hash = page.id;

  document.querySelectorAll('.pg-link').forEach(el=>{
    el.classList.toggle('active', el.dataset.id===page.id);
  });
  document.querySelectorAll('.cat-block').forEach(bl=>{
    if(bl.querySelector('.pg-link.active')) bl.classList.add('open');
  });

  renderPage(page);
  closeSidebar();
}

function renderPage(page){
  const el = document.getElementById('wiki-content');
  if(!el) return;
  el.innerHTML = `<div class="pv">
    <div class="pv-head">
      <h1 class="pv-title">${page.icon||''} ${e(page.title)}</h1>
      ${page.desc?`<p class="pv-desc">${e(page.desc)}</p>`:''}
    </div>
    <div class="wc">${mdToHtml(page.content||'')}</div>
  </div>`;
}

/* ── Markdown ────────────────────────────────────────────────── */
function mdToHtml(raw){
  if(!raw) return '';
  let s = raw;

  // Protège les blocs de code
  const blocks=[];
  s = s.replace(/```([\s\S]*?)```/g,(_,c)=>{blocks.push(c);return`\x00B${blocks.length-1}\x00`});

  // Escape HTML
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Inline code
  s = s.replace(/`([^`\n]+)`/g,'<code>$1</code>');

  // Images
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" loading="lazy">');

  // Liens
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Blockquote
  s = s.replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>');

  // HR
  s = s.replace(/^---$/gm,'<hr>');

  // Tableaux
  s = s.replace(/(\|.+\|\n)(\|[-| :]+\|\n)((?:\|.+\|?\n?)*)/g,(_,h,__,b)=>{
    const ths = h.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = b.trim().split('\n').map(row=>{
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  });

  // Titres
  s = s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,  '<h1>$1</h1>');

  // Gras / italique
  s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,'<em>$1</em>');

  // Listes
  s = s.replace(/((?:^- .+\n?)+)/gm,m=>{
    const li=m.trim().split('\n').map(l=>`<li>${l.replace(/^- /,'')}</li>`).join('');
    return `<ul>${li}</ul>`;
  });
  s = s.replace(/((?:^\d+\. .+\n?)+)/gm,m=>{
    const li=m.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
    return `<ol>${li}</ol>`;
  });

  // Paragraphes
  s = s.replace(/\n{2,}/g,'</p><p>');
  s = `<p>${s}</p>`;
  s = s.replace(/<p>\s*(<(?:h[1-6]|ul|ol|pre|blockquote|hr|div)[^>]*>)/g,'$1');
  s = s.replace(/(<\/(?:h[1-6]|ul|ol|pre|blockquote|hr|div)>)\s*<\/p>/g,'$1');
  s = s.replace(/<p>\s*<\/p>/g,'');

  // Réinsère les blocs de code
  s = s.replace(/\x00B(\d+)\x00/g,(_,i)=>{
    const code = blocks[+i].replace(/^\n/,'').replace(/\n$/,'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<pre><code>${code}</code></pre>`;
  });

  return s.trim();
}

/* ── Recherche ───────────────────────────────────────────────── */
function setupSearch(){
  const inp = document.getElementById('s-input');
  const drop = document.getElementById('s-drop');
  if(!inp||!drop) return;

  let t;
  inp.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>doSearch(inp.value.trim()),180)});
  inp.addEventListener('focus',()=>{if(inp.value.trim())doSearch(inp.value.trim())});
  document.addEventListener('click',ev=>{
    if(!ev.target.closest('.hdr-search')){drop.classList.remove('on');inp.value=''}
  });
}

function doSearch(q){
  const drop = document.getElementById('s-drop');
  if(!q){drop.classList.remove('on');return}
  const ql=q.toLowerCase();
  const cats={};
  (DATA?.categories||[]).forEach(c=>cats[c.id]=c);
  const res=(DATA?.pages||[]).filter(p=>
    p.title.toLowerCase().includes(ql)||
    (p.desc||'').toLowerCase().includes(ql)||
    (p.content||'').toLowerCase().includes(ql)
  ).slice(0,7);

  if(!res.length){
    drop.innerHTML=`<div class="s-empty">Aucun résultat pour « ${e(q)} »</div>`;
  }else{
    drop.innerHTML=res.map(p=>`
      <div class="s-item" onclick="goTo('${p.id}');document.getElementById('s-drop').classList.remove('on');document.getElementById('s-input').value=''">
        <span class="s-item-icon">${p.icon||'📄'}</span>
        <div>
          <div class="s-item-title">${e(p.title)}</div>
          <div class="s-item-cat">${cats[p.catId]?cats[p.catId].name:''}</div>
        </div>
      </div>`).join('');
  }
  drop.classList.add('on');
}

/* ── Burger / sidebar mobile ─────────────────────────────────── */
function setupBurger(){
  const btn = document.getElementById('burger');
  const ovl = document.getElementById('overlay');
  if(btn) btn.addEventListener('click',toggleSidebar);
  if(ovl) ovl.addEventListener('click',closeSidebar);
}
function toggleSidebar(){
  document.getElementById('sidebar')?.classList.toggle('open');
  document.getElementById('burger')?.classList.toggle('open');
  document.getElementById('overlay')?.classList.toggle('on');
}
function closeSidebar(){
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('burger')?.classList.remove('open');
  document.getElementById('overlay')?.classList.remove('on');
}

/* ── Statut MC ───────────────────────────────────────────────── */
function startMC(){updateMC();setInterval(updateMC,60000)}

async function updateMC(){
  const dot=document.getElementById('mc-dot');
  const txt=document.getElementById('mc-txt');
  const ip=document.getElementById('mc-ip');
  if(!dot||!txt||!DATA) return;

  const s=DATA.settings;
  if(ip) ip.textContent=s.mcIp||'connect.axohosts.fr:25883';

  if(s.maintenance){
    dot.className='mc-dot maint';
    txt.textContent='Maintenance';
    return;
  }

  try{
    const r=await fetch(`https://api.mcstatus.io/v2/status/java/${s.mcHost||'163.5.141.232'}:${s.mcPort||25816}`);
    const j=await r.json();
    if(j.online){
      dot.className='mc-dot on';
      txt.textContent=`En ligne · ${j.players?.online||0}/${j.players?.max||0} joueurs`;
    }else throw 0;
  }catch{
    dot.className='mc-dot off';
    txt.textContent='Hors ligne';
  }
}

/* ── Utils ───────────────────────────────────────────────────── */
function e(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.className=`on ${type}`;
  setTimeout(()=>t.className='',3000);
}
</script>
